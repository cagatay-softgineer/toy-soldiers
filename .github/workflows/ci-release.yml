# Continuous CI + GitHub Release on every push to main.
# Tag: v0.0.0-dev.<run_number>+<short_sha>
# Pre-release by default (dev channel until v1.0).

name: CI & Continuous Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout toy-soldiers
        uses: actions/checkout@v4

      - name: Checkout Box3D (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: erincatto/box3d
          path: box3d-src

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: |
          $box = Join-Path $env:GITHUB_WORKSPACE "box3d-src"
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DTOY_BOX3D_DIR="$box"

      - name: Build Release
        run: cmake --build build --parallel

      - name: Verify (scripts/verify.ps1)
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/verify.ps1 -Configuration Release -BuildDir build

      - name: Stage artifacts
        shell: pwsh
        run: |
          $bin = "build/bin"
          if (-not (Test-Path "$bin/toy_sim.exe")) { $bin = "build/bin/Release" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "$bin/*.exe" dist/ -ErrorAction SilentlyContinue
          Copy-Item README.md, CHANGELOG.md, LICENSE dist/ -ErrorAction SilentlyContinue
          Copy-Item -Recurse docs dist/docs -ErrorAction SilentlyContinue

      - name: Upload Windows artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toy-soldiers-windows-Release
          path: dist/**
          if-no-files-found: warn

  continuous-release:
    name: Publish continuous release
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: toy-soldiers-windows-Release
          path: dist

      - name: Package zip
        run: |
          cd dist
          zip -r ../toy-soldiers-windows.zip . || python -c "import shutil; shutil.make_archive('../toy-soldiers-windows','zip','./')"

      - name: Create continuous GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN="${GITHUB_RUN_NUMBER}"
          TAG="v0.0.0-dev.${RUN}+${SHORT_SHA}"
          TITLE="Continuous ${TAG}"
          NOTES="## Continuous release (auto)

          - **Commit:** \`${GITHUB_SHA}\`
          - **Branch:** \`${GITHUB_REF_NAME}\`
          - **Run:** [#${RUN}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})
          - **Channel:** pre-release / dev

          Built on \`windows-latest\` after headless tests.
          Roadmap: [docs/ROADMAP_to_v1.md](docs/ROADMAP_to_v1.md)
          "

          gh release delete "$TAG" -y 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            --prerelease \
            --target "$GITHUB_SHA" \
            toy-soldiers-windows.zip
